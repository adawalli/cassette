# Full example config with all options.
#
# This example uses the `steps:` format for prompt chaining (two LLM calls,
# each writing its own output file). If you only need a single prompt, replace
# the entire `steps:` block with a single `prompt:` field instead:
#
#   prompt: |
#     You are a meeting transcript editor. Clean up this raw transcript...

# Optional: watch a directory (e.g. ~/Downloads) and move matching files
# into root_dir before processing.
#
# intake:
#   source_dir: ~/Downloads
#   include_glob: "**/*.vtt"
#   exclude_glob: []
#   delete_source: true

watch:
  root_dir: ~/Documents/meetings
  stable_window_ms: 3000
  include_glob: "**/*.{json,vtt}"
  exclude_glob:
    - "**/_failed/**"

output:
  markdown_suffix: ".md"
  overwrite: false
  # copy_to: "~/notes/meetings"
  # copy_filename: "{{date}} {{title}}"  # template for copied filenames; supports {{date}}, {{stem}}, {{title}}
  # stem_strip: "_[a-f0-9]{4,8}$"       # regex (or array) to strip unwanted suffixes from {{stem}}

failure:
  move_failed: true
  failed_dir_name: "_failed"
  write_error_log: true

llm:
  base_url: "https://api.openai.com/v1/"
  model: "gpt-4o"
  temperature: 0.1
  max_tokens: 12000
  timeout_ms: 120000
  retries: 3

# transcript settings are only used for JSON files.
# VTT files are parsed natively and ignore this section.
transcript:
  path: "$[*]"
  speaker_field: "speaker"
  text_field: "text"

steps:
  - name: clean
    suffix: ".cleaned.md"
    prompt: |
      You are a meeting transcript editor. Clean up this raw transcript:
      1. Fix obvious transcription errors and filler words (um, uh, like, you know)
      2. Merge fragmented sentences into complete thoughts
      3. Preserve speaker labels and the chronological order
      4. Output the result as clean Markdown with each speaker turn on its own line

      Do NOT invent information. Only include what is in the transcript.

  - name: summarize
    suffix: ".summary.md"
    notify: true
    prompt: |
      You are a meeting analyst. Summarize the cleaned transcript below.

      Use these sections:
      - **Key Points** - bullet list of the most important points raised
      - **Detailed Summary** - a few paragraphs covering what was discussed
      - **Remaining Questions** - open questions or unresolved topics from the meeting
      - **Action Items** - bullet list of tasks, each with owner and deadline if mentioned

      Output as Markdown.

      Add this disclaimer at the bottom:
      > This summary was generated by an AI and may contain errors. Verify important details against the original transcript.

      Do NOT invent information. Only include what is in the transcript.

# Optional: run a shell command after each file is processed.
# Supports {{input}}, {{output}}, {{root_dir}} template variables.
# Per-step hooks are also available when notify: true is set on a step
# (adds {{step_name}} and {{step_output}} variables).
#
# on_complete:
#   command: 'terminal-notifier -title "Cassette" -message "Transcribed {{input}}" -open "file://{{output}}"'
#   timeout_ms: 10000
